<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FlowLedger — Mobile Redesign</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="tokens.css" />

  <style>
    html, body, #root { width: 100%; height: 100%; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #0d0d10; color: #fff; overflow: hidden; }
    * { box-sizing: border-box; }
    :root { color-scheme: dark; }

    /* Inter tabular numerals helper */
    .tnum { font-variant-numeric: tabular-nums; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="screens-auth.jsx"></script>
  <script type="text/babel" src="screens-onboarding.jsx"></script>
  <script type="text/babel" src="screens-core.jsx"></script>
  <script type="text/babel" src="screens-clients.jsx"></script>
  <script type="text/babel" src="screens-misc.jsx"></script>
  <script type="text/babel" src="app-canvas.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "mode": "both",
      "accent": "indigo",
      "ccy": "USD",
      "radius": "default",
      "density": "comfortable",
      "font": "inter"
    }/*EDITMODE-END*/;

    function Root() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      return (
        <>
          <AppCanvas tweaks={t} />
          <TweaksPanel title="FlowLedger">
            <TweakSection label="Display" />
            <TweakRadio label="Modes" value={t.mode}
              options={[
                { value: 'both', label: 'Both' },
                { value: 'dark', label: 'Dark' },
                { value: 'light', label: 'Light' },
              ]}
              onChange={(v) => setTweak('mode', v)} />

            <TweakSection label="Theme" />
            <TweakRadio label="Accent" value={t.accent}
              options={[
                { value: 'indigo', label: 'Indigo' },
                { value: 'teal',   label: 'Teal' },
                { value: 'amber',  label: 'Amber' },
              ]}
              onChange={(v) => setTweak('accent', v)} />
            <TweakRadio label="Radius" value={t.radius}
              options={[
                { value: 'sharp',   label: 'Sharp' },
                { value: 'default', label: 'Default' },
                { value: 'soft',    label: 'Soft' },
              ]}
              onChange={(v) => setTweak('radius', v)} />

            <TweakSection label="Layout" />
            <TweakRadio label="Density" value={t.density}
              options={[
                { value: 'comfortable', label: 'Comfy' },
                { value: 'compact',     label: 'Compact' },
              ]}
              onChange={(v) => setTweak('density', v)} />
            <TweakRadio label="Font" value={t.font}
              options={[
                { value: 'inter',  label: 'Inter' },
                { value: 'sf',     label: 'SF Pro' },
                { value: 'system', label: 'System' },
              ]}
              onChange={(v) => setTweak('font', v)} />

            <TweakSection label="Money" />
            <TweakSelect label="Currency" value={t.ccy}
              options={[
                { value: 'USD', label: 'USD · $' },
                { value: 'EUR', label: 'EUR · €' },
                { value: 'GBP', label: 'GBP · £' },
                { value: 'EGP', label: 'EGP · E£' },
                { value: 'SAR', label: 'SAR · ﷼' },
                { value: 'AED', label: 'AED · د.إ' },
              ]}
              onChange={(v) => setTweak('ccy', v)} />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
