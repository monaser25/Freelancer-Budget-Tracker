<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FlowLedger</title>
<link rel="stylesheet" href="tokens.css" />
<script>
  // set theme class before first paint to avoid a flash
  (function(){ try { document.documentElement.classList.toggle('dark', (localStorage.getItem('fl-theme')||'dark')==='dark'); } catch(e){ document.documentElement.classList.add('dark'); } })();
</script>
<style>
  /* row actions reveal on hover */
  .fl-trow:hover .fl-rowactions { opacity: 1 !important; }
  @media (hover: none) { .fl-rowactions { opacity: 1 !important; } }

  /* ---- responsive ---- */
  @media (max-width: 1200px) {
    .fl-statgrid { grid-template-columns: repeat(3, 1fr) !important; }
    .fl-overview-grid { grid-template-columns: 1fr !important; }
    .fl-clients-grid { grid-template-columns: 1fr !important; }
    .fl-clients-side { position: static !important; flex-direction: row !important; flex-wrap: wrap; }
    .fl-clients-side > * { flex: 1; min-width: 280px; }
  }
  @media (max-width: 1024px) {
    .fl-sidebar-desktop { display: none !important; }
    .fl-hamburger { display: inline-flex !important; }
  }
  @media (max-width: 860px) {
    .fl-statgrid { grid-template-columns: repeat(2, 1fr) !important; }
    .fl-statgrid4 { grid-template-columns: repeat(2, 1fr) !important; }
    .fl-analytics-2col { grid-template-columns: 1fr !important; }
    .fl-alltime { grid-template-columns: repeat(2, 1fr) !important; }
    .fl-content { padding: 16px !important; }
    .fl-search { min-width: 44px !important; width: 40px; padding: 0 !important; justify-content: center; }
    .fl-search span, .fl-search kbd { display: none !important; }
  }
  @media (max-width: 560px) {
    .fl-statgrid { grid-template-columns: 1fr 1fr !important; }
    .fl-clients-side { flex-direction: column !important; }
  }
  @media (max-width: 1100px) {
    .fl-invoice-2pane { grid-template-columns: 1fr !important; }
    .fl-invoice-2pane > div[style*="sticky"] { position: static !important; }
    .fl-reports { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 820px) {
    .fl-pricing { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 900px) {
    .fl-authbrand { display: none !important; }
    .fl-ob-rail { display: none !important; }
    .fl-statgrid3 { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- data (plain JS) -->
<script src="data.js"></script>

<!-- design system + shell (babel) -->
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="charts.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="forms.jsx"></script>

<!-- screens (babel) -->
<script type="text/babel" src="screen-overview.jsx"></script>
<script type="text/babel" src="screen-transactions.jsx"></script>
<script type="text/babel" src="screen-clients.jsx"></script>
<script type="text/babel" src="screen-subscriptions.jsx"></script>
<script type="text/babel" src="screen-analytics.jsx"></script>

<!-- auth + utility screens (babel) -->
<script type="text/babel" src="screen-auth.jsx"></script>
<script type="text/babel" src="screen-onboarding.jsx"></script>
<script type="text/babel" src="screen-invoices.jsx"></script>
<script type="text/babel" src="screen-money.jsx"></script>
<script type="text/babel" src="screen-settings.jsx"></script>
<script type="text/babel" src="screen-util.jsx"></script>

<!-- app root (babel, last) -->
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
