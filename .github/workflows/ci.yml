name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: flowledger_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Check for merge-conflict markers
        run: |
          if git --no-pager grep -nE '^(<{7}|={7}|>{7})( |$)' -- '*.ts' '*.tsx' '*.js' '*.jsx' '*.json' '*.yml' '*.md' ':!package-lock.json' ':!**/package-lock.json'; then
            echo "::error::Merge-conflict markers found in tracked files"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -w apps/web --if-present

      - name: Generate Prisma Client
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/flowledger_test
          DIRECT_URL: postgresql://postgres:password@localhost:5432/flowledger_test
        run: npx prisma generate --schema=apps/web/prisma/schema.prisma

      - name: Run Tests
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/flowledger_test
          DIRECT_URL: postgresql://postgres:password@localhost:5432/flowledger_test
        run: npm test -w apps/web

      - name: Production Build
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/flowledger_test
          DIRECT_URL: postgresql://postgres:password@localhost:5432/flowledger_test
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ci-service-role-placeholder
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-placeholder
          NEXT_PUBLIC_API_URL: ""
        run: npm run build -w apps/web
